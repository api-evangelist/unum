naftiko: "1.0.0-alpha1"

info:
  label: "Unum HR Connect API"
  description: >-
    Unum HR Connect API shared capability definition providing eligibility
    management, benefits enrollment, leave and absence management, evidence
    of insurability (EOI) processing, and premium billing operations.
  tags:
    - Unum
    - HR Integration
    - Benefits Administration
    - Insurance
    - Leave Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNUM_CLIENT_ID: UNUM_CLIENT_ID
      UNUM_CLIENT_SECRET: UNUM_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: unum-hr-connect
      baseUri: https://api.unum.com/v1
      description: "Unum HR Connect REST API for benefits integration"
      authentication:
        type: bearer
        token: "{{UNUM_ACCESS_TOKEN}}"
      resources:
        - name: eligibility-members
          path: /eligibility/members
          description: "Member eligibility management"
          operations:
            - name: list-eligible-members
              method: GET
              description: "Retrieve eligible members for an employer group"
              inputParameters:
                - name: groupId
                  in: query
                  type: string
                  required: true
                  description: "Employer group identifier"
                - name: effectiveDate
                  in: query
                  type: string
                  required: false
                  description: "Effective date for eligibility check"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: submit-member-eligibility
              method: POST
              description: "Submit or update member eligibility"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  groupId: "{{tools.groupId}}"
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  dateOfBirth: "{{tools.dateOfBirth}}"
                  employeeId: "{{tools.employeeId}}"
                  hireDate: "{{tools.hireDate}}"
                  employmentStatus: "{{tools.employmentStatus}}"
                  effectiveDate: "{{tools.effectiveDate}}"

        - name: eligibility-member
          path: /eligibility/members/{memberId}
          description: "Individual member eligibility operations"
          operations:
            - name: get-member-eligibility
              method: GET
              description: "Get eligibility details for a specific member"
              inputParameters:
                - name: memberId
                  in: path
                  type: string
                  required: true
                  description: "Unique member identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-member-eligibility
              method: PUT
              description: "Update eligibility for an existing member"
              inputParameters:
                - name: memberId
                  in: path
                  type: string
                  required: true
                  description: "Unique member identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  employmentStatus: "{{tools.employmentStatus}}"
                  effectiveDate: "{{tools.effectiveDate}}"
            - name: terminate-member-eligibility
              method: DELETE
              description: "Terminate eligibility for a member"
              inputParameters:
                - name: memberId
                  in: path
                  type: string
                  required: true
                  description: "Unique member identifier"
                - name: terminationDate
                  in: query
                  type: string
                  required: true
                  description: "Effective termination date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: enrollment-elections
          path: /enrollment/elections
          description: "Benefits enrollment elections"
          operations:
            - name: list-enrollment-elections
              method: GET
              description: "List benefit enrollment elections for a group"
              inputParameters:
                - name: groupId
                  in: query
                  type: string
                  required: true
                  description: "Employer group identifier"
                - name: planYear
                  in: query
                  type: integer
                  required: false
                  description: "Plan year filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: submit-enrollment-election
              method: POST
              description: "Submit a new benefit enrollment election"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  memberId: "{{tools.memberId}}"
                  groupId: "{{tools.groupId}}"
                  planYear: "{{tools.planYear}}"
                  elections: "{{tools.elections}}"

        - name: leave-requests
          path: /leave/requests
          description: "Leave and absence request management"
          operations:
            - name: list-leave-requests
              method: GET
              description: "List leave requests for a group"
              inputParameters:
                - name: groupId
                  in: query
                  type: string
                  required: true
                  description: "Employer group identifier"
                - name: memberId
                  in: query
                  type: string
                  required: false
                  description: "Filter by member"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: submit-leave-request
              method: POST
              description: "Submit a new leave request"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  memberId: "{{tools.memberId}}"
                  groupId: "{{tools.groupId}}"
                  leaveType: "{{tools.leaveType}}"
                  startDate: "{{tools.startDate}}"
                  endDate: "{{tools.endDate}}"

        - name: eoi-submissions
          path: /eoi/submissions
          description: "Evidence of insurability submissions"
          operations:
            - name: list-eoi-submissions
              method: GET
              description: "List EOI submissions for a group"
              inputParameters:
                - name: groupId
                  in: query
                  type: string
                  required: true
                  description: "Employer group identifier"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by submission status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: submit-eoi
              method: POST
              description: "Submit a new EOI application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  memberId: "{{tools.memberId}}"
                  groupId: "{{tools.groupId}}"
                  productType: "{{tools.productType}}"
                  requestedBenefitAmount: "{{tools.requestedBenefitAmount}}"

        - name: billing-invoices
          path: /billing/invoices
          description: "Premium billing invoice management"
          operations:
            - name: list-billing-invoices
              method: GET
              description: "List billing invoices for an employer group"
              inputParameters:
                - name: groupId
                  in: query
                  type: string
                  required: true
                  description: "Employer group identifier"
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Filter from date"
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "Filter to date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: unum-hr-connect-api
      resources:
        - path: /v1/eligibility/members
          name: eligibility-members
          description: "Member eligibility collection"
          operations:
            - method: GET
              name: list-eligible-members
              description: "List eligible members for a group"
              call: "unum-hr-connect.list-eligible-members"
              with:
                groupId: "rest.groupId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: submit-member-eligibility
              description: "Submit member eligibility"
              call: "unum-hr-connect.submit-member-eligibility"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/eligibility/members/{memberId}
          name: eligibility-member
          description: "Individual member eligibility"
          operations:
            - method: GET
              name: get-member-eligibility
              description: "Get member eligibility by ID"
              call: "unum-hr-connect.get-member-eligibility"
              with:
                memberId: "rest.memberId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/leave/requests
          name: leave-requests
          description: "Leave request collection"
          operations:
            - method: GET
              name: list-leave-requests
              description: "List leave requests"
              call: "unum-hr-connect.list-leave-requests"
              with:
                groupId: "rest.groupId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: submit-leave-request
              description: "Submit leave request"
              call: "unum-hr-connect.submit-leave-request"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/eoi/submissions
          name: eoi-submissions
          description: "EOI submission collection"
          operations:
            - method: GET
              name: list-eoi-submissions
              description: "List EOI submissions"
              call: "unum-hr-connect.list-eoi-submissions"
              with:
                groupId: "rest.groupId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/billing/invoices
          name: billing-invoices
          description: "Billing invoice collection"
          operations:
            - method: GET
              name: list-billing-invoices
              description: "List billing invoices"
              call: "unum-hr-connect.list-billing-invoices"
              with:
                groupId: "rest.groupId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: unum-hr-connect-mcp
      transport: http
      tools:
        - name: list-eligible-members
          description: "Retrieve eligible members for an employer group"
          hints:
            readOnly: true
            openWorld: false
          call: "unum-hr-connect.list-eligible-members"
          with:
            groupId: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-member-eligibility
          description: "Get eligibility details for a specific member"
          hints:
            readOnly: true
            openWorld: false
          call: "unum-hr-connect.get-member-eligibility"
          with:
            memberId: "tools.memberId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-member-eligibility
          description: "Submit or update member eligibility information"
          hints:
            readOnly: false
            openWorld: false
          call: "unum-hr-connect.submit-member-eligibility"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-leave-requests
          description: "List leave and absence requests for a group"
          hints:
            readOnly: true
            openWorld: false
          call: "unum-hr-connect.list-leave-requests"
          with:
            groupId: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-leave-request
          description: "Submit a new leave or absence request for a member"
          hints:
            readOnly: false
            openWorld: false
          call: "unum-hr-connect.submit-leave-request"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-eoi-submissions
          description: "List evidence of insurability submissions"
          hints:
            readOnly: true
            openWorld: false
          call: "unum-hr-connect.list-eoi-submissions"
          with:
            groupId: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-eoi
          description: "Submit a new evidence of insurability application"
          hints:
            readOnly: false
            openWorld: false
          call: "unum-hr-connect.submit-eoi"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-billing-invoices
          description: "List premium billing invoices for an employer group"
          hints:
            readOnly: true
            openWorld: false
          call: "unum-hr-connect.list-billing-invoices"
          with:
            groupId: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
