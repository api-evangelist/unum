naftiko: 1.0.0-alpha2
info:
  label: Unum HR Connect API — Authentication
  description: 'Unum HR Connect API — Authentication. 1 operations. Lead operation: Get Access Token. Self-contained Naftiko
    capability covering one Unum business surface.'
  tags:
  - Unum
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNUM_API_KEY: UNUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: hr-connect-authentication
    baseUri: https://api.unum.com/v1
    description: Unum HR Connect API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: oauth-token
      path: /oauth/token
      operations:
      - name: getaccesstoken
        method: POST
        description: Get Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UNUM_API_KEY}}'
  exposes:
  - type: rest
    namespace: hr-connect-authentication-rest
    port: 8080
    description: REST adapter for Unum HR Connect API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/oauth/token
      name: oauth-token
      description: REST surface for oauth-token.
      operations:
      - method: POST
        name: getaccesstoken
        description: Get Access Token
        call: hr-connect-authentication.getaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hr-connect-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unum HR Connect API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-access-token
      description: Get Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: hr-connect-authentication.getaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
