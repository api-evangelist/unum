description: Unum is a group benefits insurance carrier. Its APIs (claims, eligibility, leave management, HRIS integrations) are not publicly priced; access is granted to brokers, employer customers, and HRIS/payroll integration partners under contract.
sources:
  - https://www.unum.com/
notes: No public pricing page exists for Unum APIs. API access is partner-gated and negotiated as part of broker, employer, or HRIS integration agreements; pricing is bundled into the underlying insurance contract rather than billed as a developer plan.
